

name: Check MEXT Italy

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run checker
        id: checker
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          OUTPUT=$(python check_mext.py)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "changed=true" && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Send email
        if: steps.checker.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Nuovo aggiornamento MEXT Undergraduate - Ambasciata del Giappone in Italia
          to: rolandomignone@icloud.com,marcellomignone@libero.it
          from: MEXT Alert <${{ secrets.MAIL_USERNAME }}>
          body: file://email_body.txt

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f state.json ]; then
            git add state.json
            git diff --cached --quiet || git commit -m "Update MEXT state"
            git push
          else
            echo "state.json non trovato, niente da committare"
          fi
